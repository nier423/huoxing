<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F7F5F0" />
    <title>星火 | 当前离线</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5f0;
        --card: rgba(255, 255, 255, 0.88);
        --text: #312924;
        --muted: #7c746d;
        --accent: #a1887f;
        --border: #e8e4df;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(161, 136, 127, 0.12), transparent 42%),
          radial-gradient(circle at bottom right, rgba(199, 93, 58, 0.1), transparent 38%),
          var(--bg);
        color: var(--text);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .card {
        width: min(100%, 560px);
        padding: 32px 28px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 24px 60px -32px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(12px);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 7vw, 48px);
        line-height: 1.1;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.9;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a,
      button {
        appearance: none;
        border: 1px solid var(--accent);
        border-radius: 999px;
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        font: inherit;
        padding: 12px 18px;
        text-decoration: none;
        transition: all 180ms ease;
      }

      a:hover,
      button:hover {
        background: var(--accent);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Offline Reading</p>
      <h1>当前网络不可用</h1>
      <p>
        星火已经为公开阅读页保留了离线缓存。你可以返回之前打开过的首页、栏目、期刊和文章页面继续阅读；投稿、设置、后台和互动提交需要联网后再继续。
      </p>
      <div class="actions">
        <a href="/">回到首页</a>
        <button type="button" onclick="window.location.reload()">重新连接</button>
      </div>
    </main>
  </body>
</html>
